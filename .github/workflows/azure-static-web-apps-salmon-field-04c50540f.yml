name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Backend
      - name: Instalar dependencias backend
        run: npm install
        working-directory: src/api

      - name: Compilar backend con TypeScript
        run: npx tsc
        working-directory: src/api

      # Frontend
      - name: Instalar dependencias frontend
        run: npm install
        working-directory: src/ui

      - name: Compilar frontend con Vite
        run: npx vite build
        working-directory: src/ui

      # Deploy
      - name: Deploy a Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/ui"          # carpeta del frontend
          api_location: "src/api"           # carpeta del backend
          output_location: "src/ui/dist"  # carpeta de salida del build
